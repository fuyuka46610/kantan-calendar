<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんたんカレンダー</title>

<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  background: #f6f7f5;
  margin: 0;
  padding: 12px;
  color: #555;
}

h2 {
  text-align: center;
  margin-bottom: 12px;
  color: #6b7c8c;
  font-size: 1.2em;
}

.grid {
  display: grid;
  grid-template-columns: 50px repeat(3, 1fr);
  gap: 10px;
}

.cell {
  background: white;
  border-radius: 18px;
  padding: 10px;
  min-height: 65px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8em;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  white-space: pre-line;
  word-break: break-word;
}

.header,
.time,
.corner {
  background: #f0f3f5;
  font-size: 0.75em;
}

.header {
  font-weight: bold;
  flex-direction: column;
}

.time {
  font-size: 0.7em;
}

.task {
  cursor: pointer;
  border: 1px dashed #d0d7de;
}

.task:active {
  transform: scale(0.97);
  opacity: 0.7;
}

.sax { background:#dce7ef; }
.cream { background:#f6edc9; }
.latte { background:#e8dcd5; }
.matcha { background:#d9e4dd; }
.sakura { background:#f3dede; }

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 85%;
  max-width: 380px;
  box-sizing: border-box;
}

input, select {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
  box-sizing: border-box;
  font: inherit;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 12px;
  background: #e3e8ec;
  font: inherit;
}
</style>
</head>

<body>

<h2 id="title">かんたんカレンダー</h2>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div id="target"></div>
    <input id="text" placeholder="予定を入力">
    <select id="color">
      <option value="sax">サックス</option>
      <option value="cream">クリーム</option>
      <option value="latte">ラテ</option>
      <option value="matcha">抹茶</option>
      <option value="sakura">さくら</option>
    </select>
    <button onclick="saveTask()">保存</button>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
const times = ["朝","昼","夕","夜"];
const grid = document.getElementById("grid");
const modal = document.getElementById("modal");
const target = document.getElementById("target");
const text = document.getElementById("text");
const color = document.getElementById("color");
const title = document.getElementById("title");

let currentKey = "";

// 日本時間のローカル日付を YYYY-MM-DD 形式で作る
function formatLocalDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

// 今日・明日・明後日を生成
function getDates() {
  const result = [];
  const labels = ["今日", "明日", "明後日"];

  for (let i = 0; i < 3; i++) {
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + i);

    result.push({
      label: labels[i],
      dateStr: `${d.getMonth() + 1}/${d.getDate()}`,
      key: formatLocalDate(d)
    });
  }

  return result;
}

// 古い日の予定を自動削除
function cleanupOldTasks() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayKey = formatLocalDate(today);

  Object.keys(localStorage).forEach((key) => {
    const match = key.match(/^(\d{4}-\d{2}-\d{2})-(朝|昼|夕|夜)$/);
    if (!match) return;

    const datePart = match[1];
    if (datePart < todayKey) {
      localStorage.removeItem(key);
    }
  });
}

// 安全に読み込み
function loadData(key) {
  try {
    return JSON.parse(localStorage.getItem(key));
  } catch {
    return null;
  }
}

// セル生成
function cell(textValue, cls) {
  const div = document.createElement("div");
  div.className = "cell " + cls;
  div.textContent = textValue;
  return div;
}

// 画面描画
function build() {
  cleanupOldTasks();
  grid.innerHTML = "";

  const dates = getDates();

  grid.appendChild(cell("", "corner"));

  dates.forEach((d) => {
    const el = cell(`${d.label}\n${d.dateStr}`, "header");
    grid.appendChild(el);
  });

  times.forEach((t) => {
    grid.appendChild(cell(t, "time"));

    dates.forEach((d) => {
      const key = `${d.key}-${t}`;
      const data = loadData(key);
      const c = cell(data ? data.text : "", "task " + (data?.color || ""));
      c.onclick = () => openModal(key, `${d.label} ${t}`, data);
      grid.appendChild(c);
    });
  });
}

function openModal(key, label, data) {
  currentKey = key;
  modal.style.display = "flex";
  target.textContent = label;
  text.value = data?.text || "";
  color.value = data?.color || "sax";
}

function closeModal() {
  modal.style.display = "none";
}

function saveTask() {
  const value = text.value.trim();
  const c = color.value;

  if (value) {
    localStorage.setItem(currentKey, JSON.stringify({ text: value, color: c }));
  } else {
    localStorage.removeItem(currentKey);
  }

  closeModal();
  build();
}

// モーダル外タップで閉じる
modal.addEventListener("click", (e) => {
  if (e.target === modal) {
    closeModal();
  }
});

// 日付が変わったら自動で再描画
function scheduleMidnightRefresh() {
  const now = new Date();
  const next = new Date();
  next.setHours(24, 0, 1, 0);

  const ms = next - now;

  setTimeout(() => {
    build();
    scheduleMidnightRefresh();
  }, ms);
}

// 長押しで全削除
let timer;
title.addEventListener("touchstart", () => {
  timer = setTimeout(() => {
    if (confirm("全部消す？")) {
      localStorage.clear();
      build();
    }
  }, 800);
});

title.addEventListener("touchend", () => clearTimeout(timer));
title.addEventListener("touchcancel", () => clearTimeout(timer));

// PC用にも少し対応
title.addEventListener("mousedown", () => {
  timer = setTimeout(() => {
    if (confirm("全部消す？")) {
      localStorage.clear();
      build();
    }
  }, 800);
});

title.addEventListener("mouseup", () => clearTimeout(timer));
title.addEventListener("mouseleave", () => clearTimeout(timer));

build();
scheduleMidnightRefresh();
</script>

</body>
</html>
