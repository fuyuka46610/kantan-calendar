<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんたんカレンダー</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  background: #f6f7f5;
  margin: 0;
  padding: 12px;
  color: #555;
}

h2 {
  text-align: center;
  margin-bottom: 12px;
  color: #6b7c8c;
  font-size: 1.2em;
}

.grid {
  display: grid;
  grid-template-columns: 50px repeat(3, 1fr);
  gap: 10px;
}

.cell {
  background: white;
  border-radius: 18px;
  padding: 10px;
  min-height: 65px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85em;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.header {
  font-weight: bold;
  background: #e7edf3;
}

.time {
  background: #f0f3f5;
  font-size: 0.75em;
}

.task {
  cursor: pointer;
  border: 1px dashed #d0d7de;
}

.task:active {
  transform: scale(0.97);
  opacity: 0.7;
}

.sax { background:#dce7ef; }
.cream { background:#f6edc9; }
.latte { background:#e8dcd5; }
.matcha { background:#d9e4dd; }
.sakura { background:#f3dede; }

.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.25);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:20px;
  width:85%;
  animation: pop 0.2s ease;
}

@keyframes pop {
  from { transform: scale(0.9); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

input, select {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
}

button {
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#e3e8ec;
}
</style>
</head>

<body>

<h2>かんたんカレンダー</h2>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div id="target"></div>
    <input id="text" placeholder="予定を入力">
    <select id="color">
      <option value="sax">サックス</option>
      <option value="cream">クリーム</option>
      <option value="latte">ラテ</option>
      <option value="matcha">抹茶</option>
      <option value="sakura">さくら</option>
    </select>
    <button onclick="saveTask()">保存</button>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
const days = ["今日","明日","明後日"];
const times = ["朝","昼","夕","夜"];

const grid = document.getElementById("grid");
let currentKey = "";

// ✅ 安全な読み込み関数
function loadData(key) {
  const raw = localStorage.getItem(key);
  if (!raw) return null;

  try {
    return JSON.parse(raw);
  } catch(e) {
    return null;
  }
}

function build() {
  grid.innerHTML = "";

  grid.appendChild(cell("", "header"));

  days.forEach(d => grid.appendChild(cell(d,"header")));

  times.forEach(t => {
    grid.appendChild(cell(t,"time"));

    days.forEach((d,di) => {
      const key = di+"-"+t;
      const data = loadData(key);

      const c = cell(data ? data.text : "", "task "+(data?.color||""));
      c.onclick = () => openModal(key, d+" "+t, data);

      grid.appendChild(c);
    });
  });
}

function cell(text, cls) {
  const div = document.createElement("div");
  div.className = "cell "+cls;
  div.textContent = text;
  return div;
}

function openModal(key,label,data){
  currentKey = key;
  document.getElementById("modal").style.display="flex";
  document.getElementById("target").textContent = label;
  document.getElementById("text").value = data?.text || "";
  document.getElementById("color").value = data?.color || "sax";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function saveTask(){
  const text = document.getElementById("text").value;
  const color = document.getElementById("color").value;

  localStorage.setItem(currentKey, JSON.stringify({text,color}));
  closeModal();
  build();
}

build();
</script>

</body>
</html>
