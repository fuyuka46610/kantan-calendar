<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんたんカレンダー</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  background: #f6f7f5;
  margin: 0;
  padding: 12px;
  color: #555;
}

h2 {
  text-align: center;
  margin-bottom: 12px;
  color: #6b7c8c;
  font-size: 1.2em;
}

.grid {
  display: grid;
  grid-template-columns: 50px repeat(3, 1fr);
  gap: 10px;
}

.cell {
  background: white;
  border-radius: 18px;
  padding: 10px;
  min-height: 65px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8em;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.header {
  font-weight: bold;
  background: #e7edf3;
  flex-direction: column;
  font-size: 0.75em;
}

.time {
  background: #f0f3f5;
  font-size: 0.7em;
}

.task {
  cursor: pointer;
  border: 1px dashed #d0d7de;
}

.task:active {
  transform: scale(0.97);
  opacity: 0.7;
}

.sax { background:#dce7ef; }
.cream { background:#f6edc9; }
.latte { background:#e8dcd5; }
.matcha { background:#d9e4dd; }
.sakura { background:#f3dede; }

/* モーダル */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.25);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:20px;
  width:85%;
}

input, select {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button {
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#e3e8ec;
}
</style>
</head>

<body>

<h2 id="title">かんたんカレンダー</h2>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div id="target"></div>
    <input id="text" placeholder="予定を入力">
    <select id="color">
      <option value="sax">サックス</option>
      <option value="cream">クリーム</option>
      <option value="latte">ラテ</option>
      <option value="matcha">抹茶</option>
      <option value="sakura">さくら</option>
    </select>
    <button onclick="saveTask()">保存</button>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
const times = ["朝","昼","夕","夜"];
const grid = document.getElementById("grid");

let currentKey = "";

// 📅 日付生成
function getDates(){
  const result = [];
  for(let i=0;i<3;i++){
    const d = new Date();
    d.setDate(d.getDate()+i);
    const label = i===0?"今日":i===1?"明日":"明後日";
    const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
    const key = d.toISOString().slice(0,10);
    result.push({label,dateStr,key});
  }
  return result;
}

// 💾 安全取得
function loadData(key){
  try{
    return JSON.parse(localStorage.getItem(key));
  }catch{
    return null;
  }
}

// 🧱 描画
function build(){
  grid.innerHTML="";
  const dates = getDates();

  grid.appendChild(cell("", "header"));

  dates.forEach(d=>{
    const el = cell(`${d.label}\n${d.dateStr}`, "header");
    el.style.whiteSpace="pre-line";
    grid.appendChild(el);
  });

  times.forEach(t=>{
    grid.appendChild(cell(t,"time"));

    dates.forEach(d=>{
      const key = d.key+"-"+t;
      const data = loadData(key);

      const c = cell(data?data.text:"", "task "+(data?.color||""));
      c.onclick = ()=>openModal(key, d.label+" "+t, data);
      grid.appendChild(c);
    });
  });
}

function cell(text, cls){
  const div = document.createElement("div");
  div.className = "cell "+cls;
  div.textContent = text;
  return div;
}

function openModal(key,label,data){
  currentKey = key;
  modal.style.display="flex";
  target.textContent = label;
  text.value = data?.text || "";
  color.value = data?.color || "sax";
}

function closeModal(){
  modal.style.display="none";
}

function saveTask(){
  const value = text.value;
  const c = color.value;
  if(value){
    localStorage.setItem(currentKey, JSON.stringify({text:value,color:c}));
  }
  closeModal();
  build();
}

// 🧹 長押しでリセット
let timer;
title.addEventListener("touchstart", ()=>{
  timer = setTimeout(()=>{
    if(confirm("全部消す？")){
      localStorage.clear();
      build();
    }
  }, 800);
});
title.addEventListener("touchend", ()=>clearTimeout(timer));

build();
</script>

</body>
</html>
